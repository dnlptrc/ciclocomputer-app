<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CicloSimple</title>
    <style>
        :root { --neon: #0f0; --dark: #000; --gray: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--neon); margin: 0; overflow: hidden; text-align: center; }
        
        /* Ecran Principal */
        .main-display { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed-val { font-size: 9rem; font-weight: 900; line-height: 1; }
        .speed-unit { font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px; }
        
        /* Bară Date */
        .data-bar { display: flex; width: 100%; justify-content: space-around; padding: 15px 0; background: rgba(255,255,255,0.05); margin-bottom: 20px; }
        .data-label { font-size: 0.7rem; text-transform: uppercase; color: #008000; }
        .data-val { font-size: 1.5rem; font-weight: bold; }

        /* Setări */
        #settingsPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 100; display: none; padding: 30px; box-sizing: border-box; }
        .btn { background: var(--gray); color: var(--neon); border: 1px solid var(--neon); padding: 15px; border-radius: 10px; width: 80%; margin: 10px 0; font-size: 1rem; }
        .config-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; z-index: 50; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-size: 1.2rem; width: 80px; text-align: center; }
    </style>
</head>
<body>

    <div class="config-btn" onclick="toggleSettings()">⚙️</div>

    <div class="main-display">
        <div class="speed-val" id="speed">0</div>
        <div class="speed-unit">KM/H</div>
        
        <div class="data-bar">
            <div class="data-item"><div class="data-label">Distanță</div><div class="data-val" id="distance">0.0</div><div class="data-label">KM</div></div>
            <div class="data-item"><div class="data-label">Calorii</div><div class="data-val" id="calories">0</div><div class="data-label">KCAL</div></div>
            <div class="data-item"><div class="data-label">Timp</div><div class="data-val" id="timer">00:00</div><div class="data-label">MIN</div></div>
        </div>
        
        <button class="btn" id="startBtn" onclick="startTracking()">START SESIUNE</button>
    </div>

    <div id="settingsPanel">
        <div style="text-align: right; font-size: 2.5rem;" onclick="toggleSettings()">✕</div>
        <h2>SETĂRI</h2>
        <div style="margin: 40px 0;">
            <label>GREUTATE TOTALĂ (KG):</label><br><br>
            <input type="number" id="totalWeight" value="90" onchange="saveSettings()">
            <p style="font-size: 0.8rem; color: #666;">(Tu + Bicicletă + Echipament)</p>
        </div>
        <hr border="0" style="border-top: 1px solid #222;">
        <button class="btn" onclick="saveAndReset()" style="color: #ff0; border-color: #ff0;">FINALIZARE & RESET</button>
        <div id="history" style="margin-top: 30px; font-size: 0.9rem; text-align: left;"></div>
    </div>

<script>
    let totalDist = 0, lastPos = null, startTime, timerInt, watchId;

    window.onload = () => {
        if(localStorage.getItem('userWeight')) document.getElementById('totalWeight').value = localStorage.getItem('userWeight');
        showHistory();
    };

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        localStorage.setItem('userWeight', document.getElementById('totalWeight').value);
    }

    async function startTracking() {
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
        document.getElementById('startBtn').style.display = 'none';
        startTime = Date.now();
        timerInt = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);

        watchId = navigator.geolocation.watchPosition(pos => {
            const c = pos.coords;
            document.getElementById('speed').innerText = c.speed ? Math.round(c.speed * 3.6) : 0;
            
            if (lastPos && (c.speed * 3.6) > 0.5) {
                const R = 6371;
                const dLat = (c.latitude - lastPos.latitude) * Math.PI / 180;
                const dLon = (c.longitude - lastPos.longitude) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lastPos.latitude*Math.PI/180)*Math.cos(c.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                
                totalDist += d;
                document.getElementById('distance').innerText = totalDist.toFixed(1);
                // Formula solicitată: Greutate Totală * Distanță * 0.15
                const kcal = totalDist * parseFloat(document.getElementById('totalWeight').value) * 0.15;
                document.getElementById('calories').innerText = Math.round(kcal);
            }
            lastPos = c;
        }, null, { enableHighAccuracy: true });
    }

    function saveAndReset() {
        if(totalDist > 0) {
            const rides = JSON.parse(localStorage.getItem('myRides') || "[]");
            rides.unshift({ date: new Date().toLocaleDateString(), km: totalDist.toFixed(1), kcal: document.getElementById('calories').innerText });
            localStorage.setItem('myRides', JSON.stringify(rides.slice(0, 5)));
        }
        location.reload();
    }

    function showHistory() {
        const rides = JSON.parse(localStorage.getItem('myRides') || "[]");
        document.getElementById('history').innerHTML = "<b>ULTIMELE CURSE:</b><br>" + 
            rides.map(r => `${r.date}: ${r.km} km | ${r.kcal} kcal`).join('<br>');
    }
</script>
</body>
</html>
