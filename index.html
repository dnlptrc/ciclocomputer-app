<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bike Pro Offline</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://unpkg.com/leaflet.tilelayer.pouchdb@1.0.0/L.TileLayer.PouchDB.js"></script>

    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; --blue: #0088ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .page { display: none; height: 82vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        
        /* Speedo */
        .v-num { font-size: 10rem; color: var(--neon); line-height: 0.8; font-weight: 900; }
        .v-timer { font-size: 2.5rem; margin-top: 10px; }

        /* Map Container */
        #map-container { 
            position: relative; 
            width: 92%; 
            height: 300px; 
            margin-top: 10px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid #333;
        }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* BUTONUL DE DESCARCARE - Fortat sa fie vizibil */
        .dl-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 9999; /* Foarte important sa fie deasupra hartii */
            background: var(--blue); 
            color: white; 
            border: none; 
            padding: 12px 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; margin-top: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; }
        .label { color: #777; font-size: 0.7rem; text-transform: uppercase; }
        .val { font-size: 1.5rem; font-weight: bold; }

        /* Nav */
        .nav { height: 18vh; display: flex; background: #050505; border-top: 1px solid #222; }
        .nav-item { flex: 1; background: none; border: none; color: #444; font-weight: bold; }
        .active-nav { color: var(--neon); border-top: 3px solid var(--neon); }

        .btn-start { background: var(--neon); color: #000; padding: 20px; border-radius: 15px; border: none; font-weight: bold; width: 85%; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <div class="v-num" id="speed">0</div>
        <div style="color:var(--neon)">KM/H</div>
        <div class="v-timer" id="activeTimer">00:00:00</div>
        <button class="btn-start" onclick="startRide()">START CURSĂ</button>
    </div>

    <div id="p2" class="page">
        <div id="map-container">
            <div id="map"></div>
            <button class="dl-btn" onclick="downloadMap()">DESCARCĂ HARTA</button>
        </div>
        <div class="stats-grid">
            <div class="card"><div class="label">Distanță</div><div class="val" id="d-val">0.0 km</div></div>
            <div class="card"><div class="label">Medie</div><div class="val" id="avg-val">0.0</div></div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-item active-nav" id="b1" onclick="showPage(1)">VITEZĂ</button>
        <button class="nav-item" id="b2" onclick="showPage(2)">HARTĂ</button>
    </div>

    <script>
        let map, tileLayer, moving = false, totalDist = 0, lastPos = null;

        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('b'+n).classList.add('active-nav');
            if(n === 2) {
                setTimeout(() => { 
                    map.invalidateSize(); 
                }, 200);
            }
        }

        // Inițializare hartă
        map = L.map('map', { zoomControl: false }).setView([44.43, 26.10], 15);
        
        tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            useCache: true, // Activează stocarea locală
            crossOrigin: true
        }).addTo(map);

        async function downloadMap() {
            const bounds = map.getBounds();
            if(confirm("Descarc zona vizibilă pentru utilizare OFFLINE?")) {
                try {
                    // Seed descarcă nivelele de zoom 14, 15 și 16 pentru zona de pe ecran
                    await tileLayer.seed(bounds, 14, 16);
                    alert("Descărcare finalizată! Harta va merge și fără internet.");
                } catch(e) {
                    alert("Eroare la descărcare. Verifică conexiunea la internet.");
                }
            }
        }

        function startRide() {
            navigator.geolocation.watchPosition(update, null, {enableHighAccuracy: true});
            alert("Cursa a început!");
        }

        function update(pos) {
            const { latitude: lat, longitude: lon, speed, accuracy } = pos.coords;
            if (accuracy > 25) return;
            
            const kmh = speed > 0 ? speed * 3.6 : 0;
            document.getElementById('speed').textContent = kmh > 3.9 ? Math.round(kmh) : 0;

            if (kmh >= 4.0) {
                moving = true;
                if (lastPos) {
                    let d = calcDist(lastPos.lat, lastPos.lon, lat, lon);
                    if (d > 0.003) {
                        totalDist += d;
                        document.getElementById('d-val').textContent = totalDist.toFixed(1) + " km";
                        lastPos = {lat, lon};
                        map.panTo([lat, lon]);
                    }
                } else { lastPos = {lat, lon}; }
            } else { moving = false; }
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; const rad = Math.PI/180;
            const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(((lon2-lon1)*rad)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
