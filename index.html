<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Computer & Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #121212; color: #00ff00; font-family: sans-serif; text-align: center; margin: 0; }
        .stats { display: flex; justify-content: space-around; padding: 20px; background: #1e1e1e; }
        .label { font-size: 0.8rem; color: #888; }
        .value { font-size: 2rem; font-weight: bold; }
        #map { height: 400px; width: 100%; border-bottom: 2px solid #00ff00; }
        .controls { padding: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #00ff00; color: #000; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="stats">
        <div>
            <div class="label">VITEZĂ</div>
            <div id="speed" class="value">0.0 km/h</div>
        </div>
        <div>
            <div class="label">DISTANȚĂ</div>
            <div id="distance" class="value">0.00 km</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startTracking()">START TRASEU</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, routeLine, marker;
        let pathCoords = [];
        let totalDistance = 0;
        let lastPos = null;

        // Inițializăm harta cu o poziție generică
        map = L.map('map').setView([44.4268, 26.1025], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        routeLine = L.polyline([], {color: '#00ff00', weight: 5}).addTo(map);

        function startTracking() {
            document.getElementById('startBtn').style.display = 'none';
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(updatePosition, handleError, {
                    enableHighAccuracy: true,
                    maximumAge: 1000
                });
            }
        }

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const currentPoint = [lat, lon];

            // 1. Actualizăm harta
            pathCoords.push(currentPoint);
            routeLine.setLatLngs(pathCoords);
            map.panTo(currentPoint);

            // Adăugăm sau mutăm markerul poziției actuale
            if (!marker) {
                marker = L.marker(currentPoint).addTo(map);
            } else {
                marker.setLatLng(currentPoint);
            }

            // 2. Calculăm viteza (km/h)
            let speedKmh = ((position.coords.speed || 0) * 3.6).toFixed(1);
            document.getElementById('speed').innerText = `${speedKmh} km/h`;

            // 3. Calculăm distanța
            if (lastPos) {
                let d = calculateDistance(lastPos.lat, lastPos.lon, lat, lon);
                totalDistance += d;
                document.getElementById('distance').innerText = `${totalDistance.toFixed(2)} km`;
            }
            lastPos = {lat, lon};
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function handleError(err) { console.error(err); }
    </script>
</body>
</html>
