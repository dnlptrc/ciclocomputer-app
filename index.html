<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bike Simple</title>
    <style>
        :root { --neon: #00ff00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        
        .speed-val { font-size: 12rem; font-weight: 900; color: var(--neon); line-height: 1; margin-top: 20vh; }
        .unit { font-size: 2rem; color: var(--neon); letter-spacing: 5px; }
        
        .stats { display: flex; justify-content: space-around; margin-top: 50px; }
        .stat-card { background: #111; padding: 20px; border-radius: 15px; width: 45%; }
        .label { color: #555; font-size: 0.8rem; margin-bottom: 5px; }
        .val { font-size: 1.8rem; font-weight: bold; }

        .btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; padding: 20px; border-radius: 50px; border: none;
            font-size: 1.5rem; font-weight: bold; background: var(--neon); color: #000;
        }
        .stop { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

    <div class="speed-val" id="speed">0</div>
    <div class="unit">KM/H</div>

    <div class="stats">
        <div class="stat-card">
            <div class="label">DISTANȚĂ</div>
            <div class="val" id="dist">0.0 km</div>
        </div>
        <div class="stat-card">
            <div class="label">TIMP ACTIV</div>
            <div id="timer" class="val">00:00</div>
        </div>
    </div>

    <button id="mainBtn" class="btn" onclick="toggleRide()">START</button>

    <script>
        let isRunning = false;
        let totalDist = 0;
        let seconds = 0;
        let lastPos = null;
        let watchId = null;
        let timerId = null;

        function toggleRide() {
            const btn = document.getElementById('mainBtn');
            if (!isRunning) {
                // START
                isRunning = true;
                btn.textContent = "STOP";
                btn.classList.add('stop');
                startTracking();
            } else {
                // STOP
                if(confirm("Salvezi cursa?")) location.reload();
            }
        }

        function startTracking() {
            // Cronometru doar când ne mișcăm
            timerId = setInterval(() => {
                if (lastPos && isRunning) {
                    // Secundele cresc doar dacă avem o poziție activă
                }
            }, 1000);

            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, speed, accuracy } = pos.coords;
                
                // FILTRU 1: Ignorăm dacă semnalul e prost (peste 30m eroare)
                if (accuracy > 30) return;

                const kmh = speed > 0 ? speed * 3.6 : 0;
                
                // FILTRU 2: Viteza sub 4 km/h = STAI PE LOC
                if (kmh < 4) {
                    document.getElementById('speed').textContent = "0";
                    return; 
                }

                document.getElementById('speed').textContent = Math.round(kmh);

                // FILTRU 3: Calculăm distanța doar dacă ne mișcăm real
                if (lastPos) {
                    let d = calcDist(lastPos.lat, lastPos.lon, lat, lon);
                    // Ignorăm salturi GPS sub 5 metri (zgomot)
                    if (d > 0.005 && d < 0.5) {
                        totalDist += d;
                        document.getElementById('dist').textContent = totalDist.toFixed(1) + " km";
                        
                        // Incrementăm timpul doar când chiar adăugăm distanță
                        seconds++;
                        updateTimerDisplay();
                    }
                }
                lastPos = { lat, lon };
            }, null, { enableHighAccuracy: true });
        }

        function updateTimerDisplay() {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('timer').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; const rad = Math.PI/180;
            const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(((lon2-lon1)*rad)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
