<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Pro - Centered Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; }

        /* Structura de Centrare Universală */
        .page { 
            display: none; 
            height: 85vh; 
            width: 100vw; 
            flex-direction: column; 
            align-items: center; /* Centrare Orizontală */
            justify-content: center; /* Centrare Verticală */
            text-align: center;
            overflow-y: auto;
        }
        .active { display: flex; }

        /* --- ECRAN 1: VITEZĂ (CENTRATA) --- */
        .speed-value { font-size: 14rem; font-weight: 900; color: var(--neon); line-height: 0.9; margin: 0; }
        .speed-label { font-size: 1.5rem; color: var(--neon); text-transform: uppercase; letter-spacing: 4px; }
        .timer-display { font-size: 3rem; margin-top: 20px; font-family: monospace; color: #eee; }

        /* --- ECRAN 2: DETALII (CENTRATA) --- */
        .stats-scroll { width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { 
            background: var(--card); 
            width: 90%; 
            max-width: 400px; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centrare conținut card */
        }
        .label { color: #888; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 2.5rem; font-weight: bold; }

        /* --- ECRAN 3: ISTORIC --- */
        .odo-section { background: var(--neon); color: #000; width: 100%; padding: 20px; margin-bottom: 20px; }
        .odo-num { font-size: 2.5rem; font-weight: 900; display: block; }

        /* Butoane */
        .action-container { display: flex; gap: 10px; width: 90%; max-width: 400px; margin-top: 20px; }
        .btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-start { background: var(--neon); color: #000; }
        .btn-stop { background: #ff4444; color: #fff; display: none; }
        .btn-clear { background: #333; color: #888; width: 90%; margin-bottom: 20px; }

        /* Navigare Jos */
        .nav { height: 15vh; display: flex; background: #080808; border-top: 1px solid #222; width: 100%; }
        .nav-item { flex: 1; background: none; border: none; color: #555; font-weight: bold; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active-nav { color: var(--neon); transform: scale(1.1); }

        #map { height: 200px; width: 90%; border-radius: 15px; margin: 10px 0; filter: grayscale(1) invert(0.9); }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <div class="speed-label">Viteză</div>
        <div class="speed-value" id="speed">0</div>
        <div class="speed-label">km/h</div>
        <div class="timer-display" id="timer">00:00:00</div>
        <div class="action-container">
            <button class="btn btn-start" id="startBtn" onclick="startRide()">START CURSĂ</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopAndSave()">STOP & SALVEAZĂ</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stats-scroll">
            <div class="card"><div class="label">Distanță</div><div class="val" id="d-val">0.0 km</div></div>
            <div class="card"><div class="label">Calorii</div><div class="val" id="c-val">0 kcal</div></div>
            <div id="map"></div>
        </div>
    </div>

    <div id="p3" class="page" style="justify-content: flex-start;">
        <div class="odo-section">
            <span style="font-size: 0.8rem; letter-spacing: 2px;">ODOMETRU TOTAL</span>
            <span class="odo-num" id="odo-display">0.0 km</span>
        </div>
        <button class="btn btn-clear" onclick="clearHistory()">ȘTERGE ISTORIC</button>
        <div id="historyList" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div class="nav">
        <button class="nav-item active-nav" id="b1" onclick="showPage(1)">VITEZĂ</button>
        <button class="nav-item" id="b2" onclick="showPage(2)">DETALII</button>
        <button class="nav-item" id="b3" onclick="showPage(3)">ISTORIC</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let rideTime = 0, totalDist = 0, totalCals = 0, moving = false, lastPos = null, path = [];
        let map, route, timerInt;

        window.onload = () => {
            const savedOdo = localStorage.getItem('bikeOdo') || "0.0";
            document.getElementById('odo-display').textContent = parseFloat(savedOdo).toFixed(1) + " km";
        };

        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('b'+n).classList.add('active-nav');
            if(n === 2 && map) setTimeout(() => map.invalidateSize(), 200);
            if(n === 3) renderHistory();
        }

        async function startRide() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            
            map = L.map('map', {zoomControl: false}).setView([44.43, 26.10], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            route = L.polyline([], {color: '#00ff00', weight: 5}).addTo(map);

            if('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});

            timerInt = setInterval(() => {
                if(moving) {
                    rideTime++;
                    totalCals += 0.018;
                    document.getElementById('timer').textContent = new Date(rideTime * 1000).toISOString().substr(11, 8);
                    document.getElementById('c-val').textContent = Math.floor(totalCals) + " kcal";
                }
            }, 1000);

            navigator.geolocation.watchPosition(update, null, {enableHighAccuracy: true});
        }

        function update(pos) {
            const { latitude: lat, longitude: lon, speed } = pos.coords;
            const kmh = speed > 0.6 ? Math.round(speed * 3.6) : 0;
            document.getElementById('speed').textContent = kmh;

            if(speed > 0.6) {
                moving = true;
                if(lastPos) {
                    let d = calcDist(lastPos.lat, lastPos.lon, lat, lon);
                    totalDist += d;
                    document.getElementById('d-val').textContent = totalDist.toFixed(1) + " km";
                }
                lastPos = {lat, lon};
                route.addLatLng([lat, lon]);
                map.panTo([lat, lon]);
            } else { moving = false; lastPos = null; }
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; const rad = Math.PI/180;
            const dLat = (lat2-lat1)*rad; const dLon = (lon2-lon1)*rad;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function stopAndSave() {
            let currentOdo = parseFloat(localStorage.getItem('bikeOdo') || "0.0");
            localStorage.setItem('bikeOdo', (currentOdo + totalDist).toFixed(2));

            const rideData = {
                date: new Date().toLocaleDateString(),
                dist: totalDist.toFixed(1),
                time: document.getElementById('timer').textContent
            };
            let history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            history.unshift(rideData);
            localStorage.setItem('bikeHistory', JSON.stringify(history));

            alert("Cursă finalizată!");
            location.reload();
        }

        function clearHistory() {
            if(confirm("Ștergi istoricul? Odometrul rămâne salvat.")) {
                localStorage.removeItem('bikeHistory');
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            list.innerHTML = '';
            if(history.length === 0) {
                list.innerHTML = '<p style="color:#555; margin-top: 20px;">Nicio cursă salvată.</p>';
                return;
            }
            history.forEach(item => {
                list.innerHTML += `<div class="card" style="padding: 10px; margin-bottom: 10px;"><div class="label">${item.date}</div><div class="val" style="font-size: 1.2rem;">${item.dist} km | ${item.time}</div></div>`;
            });
        }
    </script>
</body>
</html>
