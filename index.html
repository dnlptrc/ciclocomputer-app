<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CicloPro v2</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #000; 
            color: #0f0; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .container { border: 2px solid #333; padding: 20px; border-radius: 15px; }
        .label { font-size: 1rem; text-transform: uppercase; color: #008000; }
        .value { font-size: 5rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px #0f0; }
        .unit { font-size: 1.5rem; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; margin-top: 20px; }
        button { 
            background: #111; color: #0f0; border: 1px solid #0f0; 
            padding: 15px 30px; font-size: 1rem; border-radius: 5px; margin: 10px;
        }
        button:active { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Viteză</div>
        <div id="speed" class="value">0.0</div>
        <div class="unit">KM/H</div>

        <div class="stats-grid">
            <div>
                <div class="label">Distanță</div>
                <div id="distance" style="font-size: 2rem; font-weight: bold;">0.00</div>
                <div class="unit">KM</div>
            </div>
            <div>
                <div class="label">Timp</div>
                <div id="timer" style="font-size: 2rem; font-weight: bold;">00:00</div>
                <div class="unit">MIN</div>
            </div>
        </div>

        <button onclick="startTracking()">START</button>
        <button onclick="resetStats()">RESET</button>
    </div>

<script>
    let totalDistance = 0;
    let lastPosition = null;
    let startTime;
    let timerInterval;
    let wakeLock = null;

    // Funcție pentru a ține ecranul aprins
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {
            console.log("WakeLock error: " + err.message);
        }
    }

    function startTracking() {
        requestWakeLock();
        if (!startTime) {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(updateStats, handleError, {
                enableHighAccuracy: true,
                maximumAge: 1000
            });
        }
    }

    function updateStats(position) {
        const coords = position.coords;
        let speedKmH = coords.speed ? (coords.speed * 3.6).toFixed(1) : 0;
        document.getElementById('speed').innerText = speedKmH;

        if (lastPosition && speedKmH > 0.5) { // Calculăm distanța doar dacă ne mișcăm
            const d = calculateDistance(
                lastPosition.latitude, lastPosition.longitude,
                coords.latitude, coords.longitude
            );
            totalDistance += d;
            document.getElementById('distance').innerText = totalDistance.toFixed(2);
        }
        lastPosition = coords;
    }

    function updateTimer() {
        const diff = Date.now() - startTime;
        const minutes = Math.floor(diff / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').innerText = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function resetStats() {
        location.reload(); // Cea mai simplă metodă de reset
    }

    function handleError(error) { console.warn(error.message); }
</script>
</body>
</html>
