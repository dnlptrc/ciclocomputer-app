<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Pro v13 - Custom Modals</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; --danger: #ff4444; }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; }

        /* Centrare Pagini */
        .page { display: none; height: 85vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        /* Dashboard Centrat */
        .v-num { font-size: 14rem; font-weight: 900; color: var(--neon); line-height: 0.8; }
        .v-timer { font-size: 3.5rem; font-family: monospace; margin-bottom: 30px; }

        /* MODAL PERSONALIZAT (Înlocuiește alertele browserului) */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card); border: 2px solid var(--neon); padding: 30px;
            border-radius: 20px; width: 85%; max-width: 350px; text-align: center;
        }
        .modal-text { font-size: 1.2rem; margin-bottom: 25px; font-weight: bold; }
        .modal-btns { display: flex; gap: 10px; }

        /* Butoane */
        .btn { width: 90%; max-width: 300px; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-confirm { background: var(--neon); color: #000; flex: 1; }
        .btn-cancel { background: #333; color: #fff; flex: 1; }
        .btn-start { background: var(--neon); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; margin-top: 20px; width: 100%; }

        /* Navigare */
        .nav { height: 15vh; display: flex; background: #080808; border-top: 1px solid #222; }
        .nav-item { flex: 1; background: none; border: none; color: #444; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .nav-item.active-nav { color: var(--neon); }

        #map { height: 180px; width: 100%; border-radius: 15px; margin-top: 10px; filter: grayscale(1) invert(0.9); }
        .stats-list { width: 90%; max-width: 400px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="customModal">
        <div class="modal-content">
            <div id="modalText" class="modal-text">Ești sigur?</div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal(false)">NU</button>
                <button class="btn btn-confirm" onclick="closeModal(true)">DA</button>
            </div>
        </div>
    </div>

    <div id="p1" class="page active">
        <div class="v-num" id="speed">0</div>
        <div style="color:var(--neon); letter-spacing:3px; margin-bottom:20px;">KM/H</div>
        <div class="v-timer" id="timer">00:00:00</div>
        <button class="btn btn-start" id="startBtn" onclick="startRide()">START CURSĂ</button>
    </div>

    <div id="p2" class="page">
        <div class="stats-list">
            <div class="card"><div style="color:#888; font-size:0.8rem;">DISTANȚĂ</div><div id="d-val" style="font-size:2rem; font-weight:bold;">0.0 km</div></div>
            <div id="map"></div>
            <button class="btn btn-stop" id="stopBtn" style="display:none;" onclick="triggerStop()">FINALIZARE CURSĂ</button>
        </div>
    </div>

    <div id="p3" class="page" style="justify-content: flex-start; padding-top: 20px; overflow-y: auto;">
        <div style="background: var(--neon); color: #000; width: 90%; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <div style="font-size:0.7rem; font-weight:bold;">ODOMETRU TOTAL</div>
            <div id="odo-display" style="font-size:2rem; font-weight:bold;">0.0 km</div>
        </div>
        <div id="historyList" style="width: 90%;"></div>
        <button class="btn" style="background:#222; color:#666; font-size:0.8rem; margin-top:10px;" onclick="triggerClear()">ȘTERGE ISTORIC</button>
    </div>

    <div class="nav">
        <button class="nav-item active-nav" id="b1" onclick="showPage(1)">VITEZĂ</button>
        <button class="nav-item" id="b2" onclick="showPage(2)">DETALII</button>
        <button class="nav-item" id="b3" onclick="showPage(3)">ISTORIC</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let rideTime = 0, totalDist = 0, moving = false, lastPos = null, path = [], timerInt, pendingAction = null;
        let map, route;

        window.onload = () => {
            const odo = localStorage.getItem('bikeOdo') || "0.0";
            document.getElementById('odo-display').textContent = parseFloat(odo).toFixed(1) + " km";
        };

        // --- LOGICA MODALULUI ---
        function openModal(text, action) {
            document.getElementById('modalText').textContent = text;
            document.getElementById('customModal').style.display = 'flex';
            pendingAction = action;
        }

        function closeModal(confirmed) {
            document.getElementById('customModal').style.display = 'none';
            if (confirmed && pendingAction) pendingAction();
            pendingAction = null;
        }

        function triggerStop() { openModal("Vrei să salvezi și să închei cursa?", stopAndSave); }
        function triggerClear() { openModal("Ștergi tot istoricul curselor?", clearHistory); }

        // --- RESTUL LOGICII ---
        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('b'+n).classList.add('active-nav');
            if(n === 2 && map) setTimeout(() => map.invalidateSize(), 200);
            if(n === 3) renderHistory();
        }

        async function startRide() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            map = L.map('map', {zoomControl: false}).setView([44.43, 26.10], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            route = L.polyline([], {color: '#00ff00', weight: 6}).addTo(map);
            if('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});
            timerInt = setInterval(() => {
                if(moving) {
                    rideTime++;
                    document.getElementById('timer').textContent = new Date(rideTime * 1000).toISOString().substr(11, 8);
                }
            }, 1000);
            navigator.geolocation.watchPosition(update, null, {enableHighAccuracy: true});
        }

        function update(pos) {
            const { latitude: lat, longitude: lon, speed } = pos.coords;
            const kmh = speed > 0.6 ? Math.round(speed * 3.6) : 0;
            document.getElementById('speed').textContent = kmh;
            if(speed > 0.6) {
                moving = true;
                if(lastPos) {
                    totalDist += calcDist(lastPos.lat, lastPos.lon, lat, lon);
                    document.getElementById('d-val').textContent = totalDist.toFixed(1) + " km";
                }
                lastPos = {lat, lon};
                route.addLatLng([lat, lon]);
                map.panTo([lat, lon]);
            } else { moving = false; lastPos = null; }
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; const rad = Math.PI/180;
            const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(((lon2-lon1)*rad)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function stopAndSave() {
            let currentOdo = parseFloat(localStorage.getItem('bikeOdo') || "0.0");
            localStorage.setItem('bikeOdo', (currentOdo + totalDist).toFixed(2));
            let history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            history.unshift({ date: new Date().toLocaleDateString(), dist: totalDist.toFixed(1), time: document.getElementById('timer').textContent });
            localStorage.setItem('bikeHistory', JSON.stringify(history));
            location.reload();
        }

        function clearHistory() {
            localStorage.removeItem('bikeHistory');
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            list.innerHTML = '';
            history.forEach(item => {
                list.innerHTML += `<div class="card" style="width:100%"><div style="color:#888; font-size:0.7rem">${item.date}</div><div style="font-size:1.2rem; font-weight:bold">${item.dist} km | ${item.time}</div></div>`;
            });
        }
    </script>
</body>
</html>
