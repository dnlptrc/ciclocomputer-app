<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Pro v15 - Visible Buttons</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #111; --danger: #ff4444; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; }

        /* Pagini */
        .page { display: none; height: 82vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        /* Dashboard */
        .v-num { font-size: 13rem; color: var(--neon); line-height: 0.8; margin: 0; }
        .v-timer { font-size: 3rem; font-family: monospace; margin: 15px 0; }

        /* NAVIGARE JOS - Text Vizibil și Centrat */
        .nav { 
            height: 18vh; 
            display: flex; 
            background: #080808; 
            border-top: 2px solid #222; 
            align-items: flex-start; /* Aliniere la marginea de sus a barei */
        }
        .nav-item { 
            flex: 1; 
            background: none; 
            border: none; 
            color: #666; 
            font-weight: 900; 
            font-size: 0.9rem; /* Mărit pentru vizibilitate */
            cursor: pointer; 
            text-transform: uppercase;
            padding: 20px 5px; /* Spațiu intern pentru a centra textul */
            display: flex;
            justify-content: center;
            transition: color 0.2s;
        }
        .nav-item.active-nav { color: var(--neon); border-top: 3px solid var(--neon); }

        /* Grid Statistici */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; max-width: 400px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .label { color: #777; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; font-family: sans-serif; }
        .val { font-size: 1.6rem; font-weight: bold; }

        #map { height: 160px; width: 100%; border-radius: 15px; margin-top: 5px; filter: grayscale(1) invert(0.9); grid-column: span 2; }
        
        /* Modal Style */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--card); border: 2px solid var(--neon); padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; }

        .btn { padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; width: 90%; font-size: 1.2rem; }
        .btn-stop { background: var(--danger); color: #fff; margin-top: 10px; grid-column: span 2; width: 100%; }
    </style>
</head>
<body>

    <div id="customModal">
        <div class="modal-content">
            <div id="modalText" style="margin-bottom:25px; font-size: 1.1rem;">Mesaj confirmare</div>
            <div style="display:flex; gap:15px;">
                <button class="btn" style="background:#333; color:#fff; flex:1;" onclick="closeModal(false)">NU</button>
                <button class="btn" style="background:var(--neon); color:#000; flex:1;" onclick="closeModal(true)">DA</button>
            </div>
        </div>
    </div>

    <div id="p1" class="page active">
        <div class="v-num" id="speed">0</div>
        <div style="color:var(--neon); letter-spacing:5px; font-size: 1.2rem;">KM/H</div>
        <div class="v-timer" id="timer">00:00:00</div>
        <button class="btn" id="startBtn" style="background:var(--neon); margin-top: 20px;" onclick="startRide()">START CURSĂ</button>
    </div>

    <div id="p2" class="page">
        <div class="stats-grid">
            <div class="card"><div class="label">Distanță</div><div class="val" id="d-val">0.0 km</div></div>
            <div class="card"><div class="label">Calorii</div><div class="val" id="c-val">0 kcal</div></div>
            <div class="card"><div class="label">Altitudine</div><div class="val" id="a-val">-- m</div></div>
            <div class="card"><div class="label">Medie</div><div class="val" id="avg-val">0.0</div></div>
            <div id="map"></div>
            <button class="btn btn-stop" id="stopBtn" style="display:none;" onclick="openModal('Finalizezi cursa?', stopAndSave)">STOP & SALVEAZĂ</button>
        </div>
    </div>

    <div id="p3" class="page" style="justify-content: flex-start; padding-top:20px; overflow-y:auto;">
        <div style="background:var(--neon); color:#000; width:92%; padding:20px; border-radius:20px; margin-bottom:15px;">
            <div class="label" style="color:#000; opacity:0.8; font-weight:bold;">ODOMETRU TOTAL</div>
            <div id="odo-display" style="font-size:2.2rem; font-weight:900;">0.0 km</div>
        </div>
        <div id="historyList" style="width:92%;"></div>
        <button class="btn" style="background:#222; color:#555; font-size:0.8rem; margin: 20px 0;" onclick="openModal('Ștergi tot istoricul?', clearHistory)">ȘTERGE ISTORIC</button>
    </div>

    <div class="nav">
        <button class="nav-item active-nav" id="b1" onclick="showPage(1)">VITEZĂ</button>
        <button class="nav-item" id="b2" onclick="showPage(2)">DETALII</button>
        <button class="nav-item" id="b3" onclick="showPage(3)">ISTORIC</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let rideTime = 0, totalDist = 0, totalCals = 0, moving = false, lastPos = null, pendingAction = null;
        let map, route, timerInt;

        window.onload = () => {
            const odo = localStorage.getItem('bikeOdo') || "0.0";
            document.getElementById('odo-display').textContent = parseFloat(odo).toFixed(1) + " km";
        };

        function openModal(text, action) {
            document.getElementById('modalText').textContent = text;
            document.getElementById('customModal').style.display = 'flex';
            pendingAction = action;
        }

        function closeModal(confirmed) {
            document.getElementById('customModal').style.display = 'none';
            if(confirmed && pendingAction) pendingAction();
            pendingAction = null;
        }

        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p'+n).classList.add('active');
            document.getElementById('b'+n).classList.add('active-nav');
            if(n === 2 && map) setTimeout(() => map.invalidateSize(), 200);
            if(n === 3) renderHistory();
        }

        async function startRide() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            map = L.map('map', {zoomControl: false}).setView([44.43, 26.10], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            route = L.polyline([], {color: '#00ff00', weight: 6}).addTo(map);
            if('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(()=>{});
            
            timerInt = setInterval(() => {
                if(moving) {
                    rideTime++;
                    totalCals += 0.015;
                    document.getElementById('timer').textContent = new Date(rideTime * 1000).toISOString().substr(11, 8);
                    document.getElementById('c-val').textContent = Math.floor(totalCals) + " kcal";
                    document.getElementById('avg-val').textContent = (totalDist / (rideTime/3600) || 0).toFixed(1);
                }
            }, 1000);
            navigator.geolocation.watchPosition(update, null, {enableHighAccuracy: true});
        }

        function update(pos) {
            const { latitude: lat, longitude: lon, speed, altitude: alt } = pos.coords;
            const kmh = speed > 0.6 ? Math.round(speed * 3.6) : 0;
            document.getElementById('speed').textContent = kmh;
            if(speed > 0.6) {
                moving = true;
                if(lastPos) totalDist += calcDist(lastPos.lat, lastPos.lon, lat, lon);
                document.getElementById('d-val').textContent = totalDist.toFixed(1) + " km";
                lastPos = {lat, lon};
                route.addLatLng([lat, lon]);
                map.panTo([lat, lon]);
            } else { moving = false; lastPos = null; }
            if(alt !== null) document.getElementById('a-val').textContent = Math.round(alt) + " m";
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; const rad = Math.PI/180;
            const a = Math.sin(((lat2-lat1)*rad)/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(((lon2-lon1)*rad)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function stopAndSave() {
            let odo = parseFloat(localStorage.getItem('bikeOdo') || "0.0");
            localStorage.setItem('bikeOdo', (odo + totalDist).toFixed(2));
            let history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            history.unshift({ date: new Date().toLocaleDateString(), dist: totalDist.toFixed(1), time: document.getElementById('timer').textContent });
            localStorage.setItem('bikeHistory', JSON.stringify(history));
            location.reload();
        }

        function clearHistory() { localStorage.removeItem('bikeHistory'); renderHistory(); }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('bikeHistory') || '[]');
            list.innerHTML = '';
            history.forEach(item => {
                list.innerHTML += `<div class="card" style="width:100%; margin-bottom:10px;"><div class="label">${item.date}</div><div style="font-size:1.3rem; font-weight:bold;">${item.dist} km | ${item.time}</div></div>`;
            });
        }
    </script>
</body>
</html>
